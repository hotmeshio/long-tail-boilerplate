name: Test

on:
  push:
    branches: ['**']
  pull_request:
    branches: ['**']

jobs:
  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm run typecheck

  unit:
    name: Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
      - run: npm ci
      - run: npm test

  integration:
    name: Integration Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Start services
        run: docker compose up -d --build

      - name: Wait for health
        run: |
          for i in $(seq 1 30); do
            curl -sf http://localhost:3030/health && break
            sleep 2
          done

      - name: Seed database
        run: docker compose exec -T app npm run seed

      - name: Run integration tests
        run: docker compose exec -T app npm run test:integration

      - name: Logs on failure
        if: failure()
        run: docker compose logs app --tail 50
