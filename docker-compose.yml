services:
  app:
    build:
      context: .
      target: dev
    ports:
      - "${PORT:-3030}:3030"
    env_file:
      - path: .env
        required: false
    environment:
      POSTGRES_HOST: ${POSTGRES_HOST:-postgres}
      POSTGRES_PORT: ${POSTGRES_PORT:-5432}
      LT_S3_ENDPOINT: http://minio:9000
      LT_S3_PUBLIC_ENDPOINT: http://localhost:9002
      NATS_URL: nats://nats:4222
      NATS_TOKEN: dev_api_secret
      NATS_WS_URL: ws://localhost:9222
      NODE_OPTIONS: --max-old-space-size=3072 --max-semi-space-size=64
    depends_on:
      postgres:
        condition: service_healthy
      minio:
        condition: service_healthy
      nats:
        condition: service_healthy
    volumes:
      - ./src:/app/src
      - ./scripts:/app/scripts
      - ./tests:/app/tests
      - ./tsconfig.json:/app/tsconfig.json
      - ./vitest.config.ts:/app/vitest.config.ts

  postgres:
    image: postgres:16
    environment:
      POSTGRES_DB: myapp
      POSTGRES_PASSWORD: password
    ports:
      - "${PG_PORT:-5416}:5432"
    volumes:
      - pgdata:/var/lib/postgresql/data
    command:
      - postgres
      - -c
      - shared_buffers=256MB
      - -c
      - work_mem=16MB
      - -c
      - maintenance_work_mem=128MB
      - -c
      - wal_buffers=16MB
      - -c
      - max_wal_size=1GB
      - -c
      - checkpoint_completion_target=0.9
      - -c
      - effective_cache_size=512MB
      - -c
      - synchronous_commit=off
      - -c
      - max_connections=200
    shm_size: 512m
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres"]
      interval: 5s
      timeout: 3s
      retries: 10

  nats:
    image: nats:2-alpine
    ports:
      - "${NATS_PORT:-4222}:4222"
      - "${NATS_WS_PORT:-9222}:9222"
    command: ["-c", "/etc/nats/nats.conf", "--auth", "dev_api_secret"]
    volumes:
      - ./deploy/nats.conf:/etc/nats/nats.conf:ro
    healthcheck:
      test: ["CMD", "sh", "-c", "wget -q --spider http://localhost:8222/healthz || exit 1"]
      interval: 5s
      timeout: 3s
      retries: 5

  minio:
    image: minio/minio:latest
    command: server /data --console-address ":9001"
    ports:
      - "${MINIO_PORT:-9002}:9000"
      - "${MINIO_CONSOLE_PORT:-9003}:9001"
    environment:
      MINIO_ROOT_USER: minioadmin
      MINIO_ROOT_PASSWORD: minioadmin
    volumes:
      - miniodata:/data
    healthcheck:
      test: ["CMD", "mc", "ready", "local"]
      interval: 5s
      timeout: 3s
      retries: 5

volumes:
  pgdata:
  miniodata:
